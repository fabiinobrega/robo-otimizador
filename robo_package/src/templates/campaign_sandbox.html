<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandbox de Campanhas - Robô Otimizador de Campanhas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block bg-light sidebar">
                <div class="sidebar-sticky">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="/">
                                <i class="fas fa-home"></i>
                                Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/copy-generator">
                                <i class="fas fa-pen-fancy"></i>
                                Gerador de Copy
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/competitor-analysis">
                                <i class="fas fa-search"></i>
                                Análise de Concorrentes
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="/campaign-sandbox">
                                <i class="fas fa-flask"></i>
                                Sandbox de Campanhas
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/campaigns">
                                <i class="fas fa-bullhorn"></i>
                                Campanhas
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/settings">
                                <i class="fas fa-cogs"></i>
                                Configurações
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <main role="main" class="col-md-9 ml-sm-auto col-lg-10 px-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Sandbox de Campanhas - Teste Antes de Lançar</h1>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5><i class="fas fa-cogs"></i> Configuração da Simulação</h5>
                            </div>
                            <div class="card-body">
                                <form id="simulationForm">
                                    <div class="mb-3">
                                        <label for="plataforma" class="form-label">Plataforma</label>
                                        <select class="form-select" id="plataforma" name="plataforma">
                                            <option value="Facebook">Facebook</option>
                                            <option value="Google">Google</option>
                                            <option value="Instagram">Instagram</option>
                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label for="objetivo" class="form-label">Objetivo</label>
                                        <select class="form-select" id="objetivo" name="objetivo">
                                            <option value="Conversões">Conversões</option>
                                            <option value="Vendas">Vendas</option>
                                            <option value="Leads">Leads</option>
                                            <option value="Tráfego">Tráfego</option>
                                            <option value="Engajamento">Engajamento</option>
                                            <option value="Brand Awareness">Brand Awareness</option>
                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label for="orcamento_diario" class="form-label">Orçamento Diário (R$)</label>
                                        <input type="number" step="0.01" class="form-control" id="orcamento_diario" name="orcamento_diario" value="50.00" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="duracao_dias" class="form-label">Duração (dias)</label>
                                        <input type="number" class="form-control" id="duracao_dias" name="duracao_dias" value="7" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="publico_alvo" class="form-label">Tipo de Público</label>
                                        <select class="form-select" id="publico_alvo" name="publico_alvo">
                                            <option value="Público Amplo">Público Amplo</option>
                                            <option value="Interesses Específicos">Interesses Específicos</option>
                                            <option value="Lookalike">Lookalike</option>
                                            <option value="Remarketing">Remarketing</option>
                                            <option value="Custom Audience">Custom Audience</option>
                                        </select>
                                    </div>
                                    <div class="row">
                                        <div class="col-md-6">
                                            <label for="idade_min" class="form-label">Idade Mínima</label>
                                            <input type="number" class="form-control" id="idade_min" name="idade_min" value="18" min="18" max="65">
                                        </div>
                                        <div class="col-md-6">
                                            <label for="idade_max" class="form-label">Idade Máxima</label>
                                            <input type="number" class="form-control" id="idade_max" name="idade_max" value="65" min="18" max="65">
                                        </div>
                                    </div>
                                    <div class="mb-3 mt-3">
                                        <label for="localizacao" class="form-label">Localização</label>
                                        <select class="form-select" id="localizacao" name="localizacao">
                                            <option value="Brasil">Brasil</option>
                                            <option value="Estados Unidos">Estados Unidos</option>
                                            <option value="Europa">Europa</option>
                                            <option value="América Latina">América Latina</option>
                                        </select>
                                    </div>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-play"></i> Executar Simulação
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <div id="resultados" style="display: none;">
                            <div class="card">
                                <div class="card-header">
                                    <h5><i class="fas fa-chart-bar"></i> Resultados da Simulação</h5>
                                </div>
                                <div class="card-body">
                                    <div id="metricas-principais"></div>
                                    <div id="recomendacoes"></div>
                                </div>
                            </div>
                            
                            <div class="card mt-3">
                                <div class="card-header">
                                    <h5><i class="fas fa-chart-line"></i> Performance Diária Estimada</h5>
                                </div>
                                <div class="card-body">
                                    <canvas id="chartPerformance" width="400" height="200"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('simulationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            
            fetch('/api/simulate-campaign', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(data => {
                if (data.erro) {
                    alert('Erro na simulação: ' + data.erro);
                    return;
                }
                
                // Mostrar resultados
                document.getElementById('resultados').style.display = 'block';
                
                // Métricas principais
                const metricas = document.getElementById('metricas-principais');
                metricas.innerHTML = `
                    <div class="row">
                        <div class="col-md-6">
                            <p><strong>Orçamento Total:</strong> R$ ${data.orcamento_total.toFixed(2)}</p>
                            <p><strong>Impressões:</strong> ${data.impressoes_estimadas.toLocaleString()}</p>
                            <p><strong>Alcance:</strong> ${data.alcance_estimado.toLocaleString()}</p>
                        </div>
                        <div class="col-md-6">
                            <p><strong>Cliques:</strong> ${data.cliques_estimados}</p>
                            <p><strong>CTR:</strong> ${data.ctr_estimado}%</p>
                            <p><strong>CPC:</strong> R$ ${data.cpc_estimado}</p>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <p><strong>Conversões:</strong> ${data.conversoes_estimadas}</p>
                            <p><strong>ROI:</strong> ${data.roi_estimado}%</p>
                        </div>
                        <div class="col-md-6">
                            <p><strong>Receita Estimada:</strong> R$ ${data.receita_estimada.toFixed(2)}</p>
                            <p><strong>Confiança:</strong> ${data.nivel_confianca}%</p>
                        </div>
                    </div>
                `;
                
                // Recomendações
                const recomendacoes = document.getElementById('recomendacoes');
                recomendacoes.innerHTML = `
                    <h6>Recomendações:</h6>
                    <ul>
                        ${data.recomendacoes.map(rec => `<li>${rec}</li>`).join('')}
                    </ul>
                `;
                
                // Gráfico de performance diária
                const ctx = document.getElementById('chartPerformance').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.metricas_diarias.map(d => `Dia ${d.dia}`),
                        datasets: [{
                            label: 'Cliques',
                            data: data.metricas_diarias.map(d => d.cliques),
                            borderColor: 'rgb(75, 192, 192)',
                            tension: 0.1
                        }, {
                            label: 'Conversões',
                            data: data.metricas_diarias.map(d => d.conversoes),
                            borderColor: 'rgb(255, 99, 132)',
                            tension: 0.1
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        }
                    }
                });
            })
            .catch(error => {
                console.error('Erro:', error);
                alert('Erro na simulação');
            });
        });
    </script>
</body>
</html>
