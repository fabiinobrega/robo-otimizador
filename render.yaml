# Render configuration file
services:
  - type: web
    name: robo-otimizador
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    branch: main
    buildCommand: ""
    startCommand: "python main_advanced.py"
    healthCheckPath: /
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: PORT
        value: 5000
      - key: RENDER
        value: true
    # Optional environment variables (can be set in Render dashboard)
    # - key: OPENAI_API_KEY
    #   sync: false
    # - key: FACEBOOK_ACCESS_TOKEN
    #   sync: false
    # - key: GOOGLE_DEVELOPER_TOKEN
    #   sync: false
